name: mogusync
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.2
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  http: ^1.6.0
  lucide_icons_flutter: ^3.1.14+2
  mix: ^2.0.3
  shared_preferences: ^2.5.5
  simple_icons: ^16.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/
    - assets/illustrations/
    - assets/miscellaneous/
